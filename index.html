<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>Nethack Player</title>
    <style>
        * {
            touch-action: manipulation;
        }
        html {
            position: relative;
            min-height: 100%;
            height: 100%;
        }
        body {
            background-color: #222;
            color: white;
            font-family: Courier, monospace;
            font-size: 20px;
            user-select: none;
            margin: 0;
            padding: 0;
        }
        #root {
            background-color: black;
        }
        #root div {
            float: left;
            width: 12px;
            height: 22px;
        }
        #menus p {
            margin: 0;
            padding: 0;
        }
        #msg {
            white-space: pre;
        }
        #container {
            display: flex;
            flex-direction: column;
        }
        #header {
            background-color: black;
            position: absolute;
            margin: 0;
            padding: 0;
            border: 1px solid lightgray;
            overflow: auto;
            overscroll-behavior: contain;
            font-size: 10px;
            z-index: 2;
        }
        #footerMsg {
            background-color: black;
            font-size: 16px;
            white-space: pre-wrap;
            position: absolute;
            margin: 0;
            padding: 0;
            border: 1px solid lightgray;
            overflow: auto;
            overscroll-behavior: contain;
            z-index: 2;
        }
        #footer {
            background-color: black;
            position: absolute;
            margin: 0;
            padding: 0;
            border: 1px solid lightgray;
            overflow-x: auto;
            overflow-y: hidden;
            overscroll-behavior: contain;
            display: flex;
            flex-direction: row;
            z-index: 2;
        }
        #dialog {
            position: absolute;
            margin: 0;
            padding: 0;
            border: 1px solid lightgray;
            overflow: scroll;
            overscroll-behavior: contain;
            font-size: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 3;
        }
        #padDiv {
            height: 0;
            width: 0;
            margin: 0;
            padding: 0;
        }
        #padDiv2 {
            height: 0;
            width: 0;
            margin: 0;
            padding: 0;
        }
        #floatBtn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            margin: 0;
            padding: 0;
            border: 1px solid darkgray;
            z-index: 10;
            background-color: black;
        }
        #controls {
            z-index: 20;
            position: absolute;
        }
    </style>
  </head>
  <body>
    <div id="controls">
        <button id="playStartBtn">Play</button>
        <input type="file" id="upload"></div>
    </div>
    <div id="header"></div>
    <div id="footerMsg"></div>
    <div id="footer"></div>
    <div id="dialog"></div>
    <div id="floatBtn"></div>
    <div id="container">
        <div id="status"></div>
        <div id="padDiv"></div>
        <div id="root"></div>
        <div id="msg"></div>
        <div id="menus"></div>
        <div id="padDiv2"></div>
    </div>
  </body>
  <script type="module">

let mobile = true;
const flags = document.location.hash.replaceAll("#", ";").split(";");
for (const flag of flags) {
    if (flag === "pc") {
        mobile = false;
    }
}

let skipInput = "";
let skip;
let paused = false;
let pauseResolve;
let pausePromise = Promise.resolve();
let mobileKbOn = false;
let shift = false;
let ctrl = false;
let meta = false;
let dialogOn = false;
let floatBtnOn = false;
let footerHeight = 0;
let winCount = 0;
const windows = [];
let touchTimer;
let btnTouchTimer;
const touchStart = {};
let disableClick = false;
let disableClickTimer;
const autoQueue = [];
const autoCodeQueue = [];
const autoLookMsgs = [];
let autoLookAction = false;
let autoTravelTarget;
let lastHandledKeyCodes = [];
let inputResolve;
let isCmdInput = false;
let cmdInput = "";
let menuOptionForInput = "";
let openKbPage = -1;
let prevKbState = -1;
const rowno = 21;
const colno = 80;
let curs;
let cursColor = "darkgreen";
const colorsByCoords = {};
const bgColorsByCoords = {};
const selectorsByMenu = {};
const groupSelectorsByMenu = {};
const incSelectionsByMenu = {};
const openPageByWindow = {};
const statusMap = {};
let condsMap = {};
const prevMsgs = [];
let prevMsgsOffset = 1;
let skipMsgSaves = false;
let msg = document.getElementById("msg");
const root = document.getElementById("root");
let menus = document.getElementById("menus");
let status = document.getElementById("status");
const header = document.getElementById("header");
const footer = document.getElementById("footer");
const footerMsg = document.getElementById("footerMsg");
const dialog = document.getElementById("dialog");
const floatBtn = document.getElementById("floatBtn");
const padDiv = document.getElementById("padDiv");
const padDiv2 = document.getElementById("padDiv2");
const upload = document.getElementById("upload");
const playStartBtn = document.getElementById("playStartBtn");

let combinedData = "";

upload.onchange = e => {
    const loader = new FileReader();
    playStartBtn.disabled = true;
    loader.onload = le => {
        if (le.target.readyState !== 2 || le.target.error) {
            return;
        }
        playStartBtn.disabled = false
        combinedData += le.target.result;
    }
    loader.readAsText(e.target.files[0]);
}

playStartBtn.onclick = async () => {
    upload.style.display = "none";
    playStartBtn.style.display = "none";
    const dataParsed = combinedData.trim().split('\n').map(d => JSON.parse(d));
    for (const d of dataParsed) {
        if (skip) {
            skip--;
        }
        if (d.name === "shim_nhgetch" || d.name === "shim_nh_poskey") {
            if (!skip) {
                await new Promise(r => setTimeout(r, 300));
            }
        } else if (d.name !== "shim_print_glyph") {
            // await new Promise(r => setTimeout(r, 10));
        }
        await callback(d.name, ...d.args);
        if (paused) {
            await pausePromise;
        }
    }
};

document.addEventListener("keydown", e => {
    if (e.key === " ") {
        if (paused) {
            pauseResolve();
        } else {
            pausePromise = new Promise(r => { pauseResolve = r; });
        }
        paused = !paused;
    } else if (e.key === "Escape") {
        skipInput = "";
    } else if (e.key === "ArrowRight") {
        const n = Number(skipInput)
        skipInput = "";
        if (n && !isNaN(n)) {
            skip = n;
        }
    } else {
        skipInput += e.key;
    }
});

if (mobile) {
    msg = footerMsg;
    menus = dialog;
    status = header;
    document.body.style.position = "fixed";
    window.visualViewport.onresize = adjustFixedDivs;
    window.visualViewport.onscroll = adjustFixedDivs;
    createMobileControls();
    adjustFixedDivs();
    document.addEventListener("touchstart", e => {
        if ([header, footerMsg, footer, dialog].some(el => el.contains(e.target))
            || e.touches.length > 1 || floatBtnOn 
        ) {
            return;
        }
        const coords = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        touchStart.x = coords.x;
        touchStart.y = coords.y;
        const key = getDirectionKeyChar(coords).toUpperCase();
        clearTimeout(touchTimer);
        touchTimer = setTimeout(() => {
            disableClick = true; // prevent click from this same event
            disableClickTimer = setTimeout(() => { disableClick = false; }, 500);
            if (autoTravelIfPan(coords)) {
                return;
            }
            handleKey(key);
        }, 500);
    });
    document.addEventListener("touchmove", e => {
        clearTimeout(touchTimer);
        if ([header, footerMsg, footer, dialog].some(el => el.contains(e.target))
            || e.touches.length > 1
        ) {
            return;
        }
        // allow scrolling map back into view if hidden by centering margin
        const rect = root.getBoundingClientRect();
        const touchX = e.touches[0].clientX;
        const touchY = e.touches[0].clientY;
        const { offsetTop, offsetLeft, height, width, scale } = window.visualViewport;
        const padX = (width / 3);
        const padY = (height / 3);
        const tolerance = 10;
        const scrollingPastStartX = touchX > touchStart.x && rect.x < padX && offsetLeft <= tolerance;
        const scrollingPastEndX = touchX < touchStart.x && rect.x + rect.width > (window.innerWidth - padX)
            && (offsetLeft + width) >= window.innerWidth - tolerance;
        const scrollingPastStartY = touchY > touchStart.y && rect.y < padY && offsetTop <= tolerance;
        const scrollingPastEndY = touchY < touchStart.y && rect.y + rect.height > (window.innerHeight - padY)
            && (offsetTop + height) >= window.innerHeight - tolerance;
        if (scrollingPastStartX || scrollingPastEndX) {
            const prevMarginLeft = Number(root.style.marginLeft?.slice(0, -2));
            const adjustAmount = touchX - touchStart.x;
            root.style.marginLeft = `${prevMarginLeft + adjustAmount}px`;
        }
        if (scrollingPastStartY || scrollingPastEndY) {
            const prevMarginTop = Number(root.style.marginTop?.slice(0, -2));
            const adjustAmount = touchY - touchStart.y;
            root.style.marginTop = `${prevMarginTop + adjustAmount}px`;
        }
        touchStart.x = touchX;
        touchStart.y = touchY;
    });
    document.addEventListener("touchend", e => {
        clearTimeout(touchTimer);
    });
    document.addEventListener("click", e => {
        if ([header, footerMsg, footer, dialog].some(el => el.contains(e.target)) || disableClick || floatBtnOn) {
            return;
        }
        if (inputResolve) {
            const key = getDirectionKeyChar(e);
            const closestAnd2ndClosest = getClosestAnd2ndClosestCell(e);
            if (curs === closestAnd2ndClosest.closest || curs === closestAnd2ndClosest.secondClosest) {
                autoLookAction = true;
                inputResolve(":".charCodeAt(0));
                updateLastHandled(":".charCodeAt(0));
            } else {
                inputResolve(key.charCodeAt(0));
                updateLastHandled(key.charCodeAt(0));
            }
        }
    });
    floatBtn.onclick = () => {
        if (dialogOn) {
            dialog.style.display = "none";
            dialogOn = false;
            floatBtn.innerHTML = "+";
        } else {
            initDialog();
            adjustFixedDivs();
        }
    };
    floatBtn.style.display = "none";
} else {
    header.style.display = "none";
    footerMsg.style.display = "none";
    footer.style.display = "none";
    dialog.style.display = "none";
    floatBtn.style.display = "none";
    document.onkeydown = e => handleKey(e.key, e.ctrlKey, e.altKey, e.location === 3);
}

for (let i = 0; i < rowno; i++) {
    for (let j = 0; j < colno; j++) {
        const div = document.createElement("div");
        div.id = `${j + 1}_${i}`;
        root.appendChild(div);
    }
}

root.style.width = `${colno * 12}px`;

async function callback(name, ...args) {
    let key;
    let id;
    let menu;
    let menuText;
    let textId;
    let cmdIdx;

    switch(name) {
        case "shim_player_selection_or_tty":
            return true;
        case "shim_delay_output":
            if (!skip) {
                await new Promise(r => setTimeout(r, 50));
            }
            return 0;
        case "shim_putstr":
        case "shim_putmixed":
            id = `menu_${args[0]}`;
            menu = document.getElementById(id);
            if (mobile && menu) {
                menu.style.flex = "1";
                textId = `${id}_text`;
                menuText = document.getElementById(textId);
                if (!menuText) {
                    menuText = document.createElement("div");
                    menuText.id = textId;
                    menu.appendChild(menuText);
                }
                menuText.innerHTML += "\n" + args[2];
            } else {
                newMsg(args[2], true);
            }
            return 0;
        case "shim_raw_print":
        case "shim_raw_print_bold":
            newMsg(args[0], true);
            return 0;
        case "shim_status_update":
            updateStatus(args);
            return 0;
        case "shim_print_glyph":
            const x = args[1];
            const y = args[2];
            const c = args[3].c;
            const color = args[3].color;
            const bgColor = args[3].bgColor;
            document.getElementById(`${x}_${y}`).innerHTML = c;
            document.getElementById(`${x}_${y}`).style.color = color;
            document.getElementById(`${x}_${y}`).style.backgroundColor = bgColor;
            colorsByCoords[`${x}_${y}`] = color;
            bgColorsByCoords[`${x}_${y}`] = bgColor;
            return 0;
        case "shim_curs":
            if (curs) {
                curs.style.color = colorsByCoords[curs.id] || "";
                curs.style.backgroundColor = bgColorsByCoords[curs.id] || "";
            }
            curs = document.getElementById(`${args[1]}_${args[2]}`);
            curs.style.color = "black";
            curs.style.backgroundColor = cursColor;
            centerIfMobile();
            return 0;
        case "shim_create_nhwindow":
            winCount++;
            const w = { id: winCount, type: args[0], selections: {} };
            windows.push(w);
            if (w.type === nethackGlobal.constants.WIN_TYPE.NHW_MENU) {
                id = `menu_${w.id}`;
                getOrCreateMenu(id);
            }
            return winCount;
        case "shim_yn_function":
            const options = getYnOptions(args);
            const useDialog = mobile && options;
            if (useDialog) {
                openYnDialog(args[0], options);
            } else {
                let endStr = args[1] ? " [" + args[1] + "]" : ""; 
                newMsg(args[0] + endStr, true);
            }
            if (!skip) {
                await new Promise(r => setTimeout(r, 500));
            }
            if (useDialog) {
                document.getElementById("yn_elem")?.remove();
                closeDialogIfEmpty();
            } else {
                newMsg("");
            }
            return key;
        case "shim_nhgetch":
        case "shim_nh_poskey":
            newMsg("");
            return key;
        case "shim_getmsghistory":
            return "";
        case "putmsghistory":
            return 0;
        case "shim_doprev_message":
            newMsg("");
            if (prevMsgs.length - prevMsgsOffset >= 0) {
                skipMsgSaves = true;
                msg.innerHTML = prevMsgs[prevMsgs.length - prevMsgsOffset];
                prevMsgsOffset++;
            }
            return 0;
        case "shim_get_ext_cmd":
            return -1;
        case "shim_getlin":
            newMsg(args[0], true);
            if (!skip) {
                await new Promise(r => setTimeout(r, 500));
            }
            newMsg("");
            return 0;
        case "shim_display_nhwindow":
            id = `menu_${args[0]}`;
            menu = document.getElementById(id);
            if (/* args[1] &&  */mobile && menu) { // for now block always
                openDialog(args[0]);
                addBaseDialogOptions(args[0]);
                if (!skip) {
                    await new Promise(r => setTimeout(r, 500));
                }
            }
            return 0;
        case "shim_destroy_nhwindow":
            destroyMenu(args[0]);
            const idx = windows.findIndex(w => w.id === args[0]);
            if (idx !== -1) {
                windows.splice(idx, 1);
            }
            return 0;
        case "shim_start_menu":
            if (args[1] === 1) {
                windows.find(w => w.id === args[0]).permInventory = true;
                id = `menu_${args[0]}`;
                menu = document.getElementById(id);
                if (menu) {
                    destroyMenu(args[0]); // no perm inventory for now
                }
            }
            return 0;
        case "shim_add_menu":
            if (windows.find(w => w.id === args[0]).permInventory) {
                return 0;
            }
            addMenuLine(args);
            return 0;
        case "shim_select_menu":
            if (windows.find(w => w.id === args[0]).permInventory) {
                return 0;
            }
            id = `menu_${args[0]}`;
            menu = document.getElementById(id);
            if (menu && mobile) {
                openDialog(args[0]);
            }
            if (!skip) {
                await new Promise(r => setTimeout(r, 500));
            }
            destroyMenu(args[0]);
            return -1;
        case "shim_end_menu":
            id = `menu_${args[0]}`;
            menuText = document.getElementById(`${id}_text`);
            if (menuText) {
                menuText.innerHTML += "\n" + args[1];
            }
            return 0;
        case "shim_clear_nhwindow":
            if (windows.find(w => w.type === nethackGlobal.constants.WIN_TYPE.NHW_MAP)?.id === args[0]) {
                clearMap();
            }
            return 0;
        case "shim_exit_nhwindows":
            clearMap();
            newMsg(args[0], true);
            windows.splice(0, windows.length); // need custom handling since actually continue without reload
            winCount = 0;
            return 0;
        default:
            return 0;
    }
}

function clearMap() {
    for (let i = 0; i < rowno; i++) {
        for (let j = 0; j < colno; j++) {
            const e = document.getElementById(`${j + 1}_${i}`);
            if (e) {
                e.innerHTML = "";
                e.style.backgroundColor = "";
            }
        }
    }
}

function newMsg(text, add) {
    if (text) {
        prevMsgsOffset = 1;
        skipMsgSaves = false;
    }
    if (msg.innerHTML && !text && !skipMsgSaves) {
        prevMsgs.push(msg.innerHTML);
    }
    if (add) {
        if (mobile && msg.innerHTML === "") {
            msg.innerHTML += text;
        } else {
            msg.innerHTML += "\n" + text;
        }
    } else {
        msg.innerHTML = text;
    }
}

function updateStatus(args) {
    prevMsgsOffset = 1; // workaround to reset prev message scrolling when a turn passes
    status.innerHTML = "";
    const { statusMap, condsMap } = args[0];
    for (const field of Object.keys(statusMap)) {
        status.innerHTML += `${field}: ${statusMap[field] || "-"} `;
    }
    for (const cond of Object.keys(condsMap)) {
        if (condsMap[cond]) {
            status.innerHTML += `${cond} `;
        }
    }
    if (statusMap["Hpmax"]) {
        const healthPercent = Number(statusMap["Hp"]) / Number(statusMap["Hpmax"]);
        if (healthPercent > 0.75) {
            cursColor = "darkgreen";
        } else if (healthPercent > 0.5) {
            cursColor = "yellow";
        } else if (healthPercent > 0.25) {
            cursColor = "orange";
        } else {
            cursColor = "red";
        }
        if (curs) {
            curs.style.backgroundColor = cursColor;
        }
    }
}

function getOrCreateMenu(id) {
    let menu = document.getElementById(id);
    if (!menu) {
        menu = document.createElement("div");
        menu.id = id;
        menu.style.whiteSpace = "pre-wrap";
        menu.style.display = "flex";
        menu.style.flexDirection = "column";
        menu.style.justifyContent = "end";
        menus.appendChild(menu);
    }
    return menu;
}

function destroyMenu(windowId) {
    const id = `menu_${windowId}`;
    const menu = document.getElementById(id);
    if (menu) {
        delete selectorsByMenu[id];
        delete groupSelectorsByMenu[id];
        delete incSelectionsByMenu[id];
        delete openPageByWindow[windowId];
        menu.remove();
    }
    closeDialogIfEmpty();
}

function addMenuLine(args) {
    let id = `menu_${args[0]}`;
    let textId = `${id}_text`;
    let menu = getOrCreateMenu(id);
    menu.style.flex = "1";
    let menuText = document.getElementById(textId);
    if (!menuText) {
        menuText = document.createElement("div");
        menuText.id = textId;
        menu.appendChild(menuText);
    }
    let isPreSelect = args[8] & 0x00000001;
    let separator = isPreSelect ? " + " : " - ";
    if (!args[2]) {
        separator = "";
    }
    let selector = "";
    const prevPage = (selectorsByMenu[id] || [])[0]?.page || 0;
    let page = prevPage;
    let group = args[4] ? args[4] : undefined;
    if (args[3]) {
        selector = args[3] ? String.fromCharCode(args[3]) : "";
    } else if (args[2]) { // selectable but need to handle selector options manually
        if (!selectorsByMenu[id]) {
            selector = getNextChar();
            selectorsByMenu[id] = [{ selector, page: 0 }];
        } else {
            selector = getNextChar(selectorsByMenu[id][0].selector);
            page = selector === "a" ? prevPage + 1 : prevPage;
            selectorsByMenu[id].unshift({ selector, page });
        }
    }
    if (isPreSelect) {
        if (!incSelectionsByMenu[id]) {
            incSelectionsByMenu[id] = [];
        }
        incSelectionsByMenu[id].push({ selector, page });
    }
    if (selector !== "") {
        windows.find(w => w.id === args[0]).selections[`${selector}_${page}`] = { id: args[2], group };
    }
    const text = selector + separator + escapeHtmlWrite(args[7]);
    if (mobile) {
        if (!groupSelectorsByMenu[id]) {
            groupSelectorsByMenu[id] = [];
        }
        // lines with no selector are titles, clicking them should trigger the group selector of all
        // the later lines before another text (Note: just assumes it will be the same for them all)
        const groupSelectorIdx = groupSelectorsByMenu[id].length;
        if (selector) {
            addDialogOption(selector, page, text, menu);
            if (group && groupSelectorsByMenu[id][groupSelectorIdx - 1] !== group) {
                groupSelectorsByMenu[id].push(group);
            }
        } else {
            addDialogOption(selector, page, text, menu, e => {
                const groupCode = groupSelectorsByMenu[id][groupSelectorIdx];
                if (isCmdInput || !groupCode) {
                    return;
                }
                e.stopPropagation();
                e.stopImmediatePropagation();
                handleKey(String.fromCharCode(groupCode));
            }, true);
        }
    } else {
        if (selector) {
            menuText.innerHTML += `<p class="page_${page}">${text}</p>`;
        } else {
            menuText.innerHTML += `<p class="page_${page} menu_text">${text}</p>`;
        }
    }
}

function addBaseDialogOptions(windowId) {
    const id = `menu_${windowId}`;
    const menu = document.getElementById(id);
    if (menu) {
        for (const option of ['Enter', 'Escape']) {
            addDialogOption(option, -1, option, menu);
        }
    }
}

function openDialog(windowId) {
    const id = `menu_${windowId}`;
    const menu = document.getElementById(id);
    if (menu) {
        initDialog();
        initFloatBtn();
        adjustFixedDivs();
    }
}

function getYnOptions(args) {
    let options;
    if (args[1]) {
        options = args[1].split("")
    } else {
        // for some reason sometimes options are in the question
        // (accept only if all are letters and only one bracket pair)
        if ((args[0].match(/\[/g) || []).length === 1) {
            options = args[0].split("[")?.[1]?.split("]")?.[0].split("");
        }
        if (options?.some(o => o.toLowerCase() === o.toUpperCase())) {
            options = undefined;
        }
    }
    return options;
}

function openYnDialog(text, options) {
    initDialog();
    initFloatBtn();
    const ynEl = getOrCreateMenu("yn_elem")
    ynEl.style.flex = "1";
    const ynElText = document.createElement("div");
    ynElText.innerHTML = text;
    ynEl.appendChild(ynElText);
    for (const option of options) {
        addDialogOption(option, -1, option, ynEl);
    }
    adjustFixedDivs();
}

function openExtDialog() {
    initDialog();
    initFloatBtn();
    const extEl = document.createElement("div");
    extEl.id = "ext_elem";
    dialog.appendChild(extEl);
    addDialogOption("Escape", -1, "Escape", extEl, e => {
        e.stopPropagation(); // prevent being detected as direction click
        e.stopImmediatePropagation();
        document.getElementById("ext_elem")?.remove();
        closeDialogIfEmpty();
    });
    for (const option of getExtCmds().filter(cmd => !wizModeCmds.includes(cmd) && !cmd.startsWith("wiz"))) {
        addDialogOption(option, -1, `#${option}`, extEl, e => {
            e.stopPropagation();
            e.stopImmediatePropagation();
            if (inputResolve) {
                inputResolve("#".charCodeAt(0));
                autoQueue.splice(0, autoQueue.length);
                autoQueue.push(option);
            }
            document.getElementById("ext_elem")?.remove();
            closeDialogIfEmpty();
        });
    }
    adjustFixedDivs();
}

function addDialogOption(option, page, text, menu, cb, onlyText) {
    const el = document.createElement("div");
    if (!onlyText) {
        el.style.border = "1px solid lightgray";
    } else {
        el.classList.add("menu_text");
    }
    el.classList.add(`page_${page}`);
    el.style.backgroundColor = "black";
    el.style.display = "flex";
    el.style.flexDirection = "column";
    el.style.justifyContent = "center";
    el.style.alignItems = "start";
    el.style.padding = "10px";
    el.style.margin = "5px";
    el.innerHTML = text;
    if (cb) {
        el.onclick = e => {
            if (isCmdInput) {
                return;
            }
            cb(e);
        };
    } else {
        el.onclick = e => {
            if (isCmdInput) {
                return;
            }
            e.stopPropagation();
            e.stopImmediatePropagation();
            handleKey(option);
        };
        if (page !== -1) {
            el.ontouchstart = e => {
                if (isCmdInput) {
                    return;
                }
                clearTimeout(btnTouchTimer);
                btnTouchTimer = setTimeout(() => enableMenuKbInput(option), 500);
            };
            el.ontouchmove = e => { clearTimeout(btnTouchTimer); };
            el.ontouchend = e => { clearTimeout(btnTouchTimer); };
        }
    }
    menu.appendChild(el);
    return el;
}

function enableMenuKbInput(option) {
    if (!mobileKbOn) {
        prevKbState = -1;
    } else {
        prevKbState = openKbPage;
    }
    mobileKbOn = true;
    createKb(3);
    adjustFixedDivs();
    footer.style.zIndex = 4;
    msg.style.zIndex = 4;
    isCmdInput = true;
    menuOptionForInput = option.charCodeAt(0);
    newMsg("");
}

function endMenuKbInput() {
    if (prevKbState === -1) {
        mobileKbOn = false;
        createMobileControls();
    } else {
        mobileKbOn = true;
        createKb(prevKbState);
    }
    adjustFixedDivs();
    centerIfMobile();
    cmdInput = "";
    menuOptionForInput = "";
    newMsg("");
    isCmdInput = false;
    footer.style.zIndex = 2;
    msg.style.zIndex = 2;
}

function initDialog() {
    // ugly hack to not trigger the annoying tap + scroll zoom
    // (present at least on Android Chrome)
    document.body.style.touchAction = "pan-y";
    setTimeout(() => { document.body.style.touchAction = ""; }, 500);
    dialog.style.display = "";
    dialog.scrollTop = 0;
    dialogOn = true;
    floatBtn.innerHTML = "-";
}

function initFloatBtn() {
    floatBtnOn = true;
    floatBtn.style.display = "";
}

function closeDialogIfEmpty() {
    if (mobile && !Array.from(dialog.children).some(el => el.id?.startsWith("menu"))) {
        dialogOn = false;
        dialog.innerHTML = "";
        dialog.style.display = "none";
        floatBtnOn = false;
        floatBtn.style.display = "none";
        adjustFixedDivs();
    }
}

function createMobileControls() {
    const chars = ['Kb', 'Ext', 'Redo', 'OPTS'];
    footer.innerHTML = "";
    footer.style.flexDirection = "row";
    for (const char of chars) {
        const el = document.createElement("div");
        el.style.display = "flex";
        el.style.flexDirection = "column";
        el.style.justifyContent = "center";
        el.style.alignItems = "center";
        el.style.padding = "10px";
        el.style.margin = "5px";
        el.style.aspectRatio = "1 / 1";
        el.style.border = "1px solid lightgray";
        el.style.backgroundColor = "black";
        el.innerHTML = char;
        el.onclick = e => {
            e.stopPropagation();
            e.stopImmediatePropagation();
            if (char === 'Kb') {
                mobileKbOn = !mobileKbOn;
                createKb();
                adjustFixedDivs();
                centerIfMobile();
            } else if (char === 'Ext' && !isCmdInput) {
                openExtDialog();
            } else if (char === 'Redo' && !isCmdInput) {
                if (inputResolve) {
                    const codes = [...lastHandledKeyCodes];
                    codes.pop(); // remove the non-number input at the end
                    if (codes.length) {
                        inputResolve(codes.shift());
                        autoQueue.push(...(codes.map(c => String.fromCharCode(c))));
                        autoCodeQueue.push(1); // Ctrl + A
                    } else {
                        inputResolve(1); // Ctrl + A
                    }
                }
            } else if (char === 'OPTS') {
                const newOpts = prompt('Give new nethack configuration options to be saved (as "OPTIONS=...")');
                if (newOpts) {
                    localStorage.setItem('nethackOptions', newOpts);
                }
            }
        };
        footer.appendChild(el);
    }
}

function createKb(idx = 0) {
    openKbPage = idx;
    const keys = [
        [
            ['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p'],
            ['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l'],
            ['Ctrl', 'Shift', 'z', 'x', 'c', 'v', 'b', 'n', 'm'],
            ['Kb', 'Sym', '123', 'Spc', 'Esc', 'Entr']
        ],
        [
            ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
            ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
            ['Ctrl', 'Shift', 'Z', 'X', 'C', 'V', 'B', 'N', 'M'],
            ['Kb', 'Sym', '123', 'Spc', 'Esc', 'Entr']
        ],
        [
            ['`', '\\', '$', '=', '/', '_', '<', '>', '[', ']'],
            ['!', '@', '#', '?', '%', '^', '&', '*', '(', ')'],
            ['Ctrl', 'Mt', '-', '\'', '"', ':', ';', ',', '.'],
            ['Kb', 'abc', '123', '+', 'Esc', 'Entr']
        ],
        [
            ['7', '8', '9'],
            ['4', '5', '6'],
            ['1', '2', '3'],
            ['Kb', 'abc', '0', 'Del', 'Esc', 'Entr']
        ]
    ];
    footer.innerHTML = "";
    footer.style.flexDirection = "column";
    for (const row of keys[idx]) {
        const rowEl = document.createElement("div");
        rowEl.style.display = "flex";
        rowEl.style.flexDirection = "row";
        rowEl.style.justifyContent = "space-between";
        rowEl.style.position = "relative";
        for (const char of row) {
            const el = document.createElement("div");
            el.style.display = "flex";
            el.style.flexDirection = "column";
            el.style.justifyContent = "center";
            el.style.alignItems = "center";
            el.style.width = "100%";
            el.style.height = "100%";
            el.style.overflow = "hidden";
            el.style.border = "1px solid lightgray";
            el.style.backgroundColor = "black";
            if ((idx === 1 && char === 'Shift') || (ctrl && char === 'Ctrl') || (meta && char === 'Mt')) {
                el.style.backgroundColor = "#555";
            }
            el.innerHTML = char;
            el.onclick = e => {
                e.stopPropagation();
                e.stopImmediatePropagation();
                if (char === 'Kb') {
                    mobileKbOn = !mobileKbOn;
                    createMobileControls();
                    adjustFixedDivs();
                    centerIfMobile();
                } else if (char === 'Shift') {
                    if (idx === 0) {
                        createKb(1);
                    } else {
                        createKb(0);
                    }
                    adjustFixedDivs();
                } else if (char === 'Ctrl') {
                    ctrl = !ctrl;
                    el.style.backgroundColor = ctrl ? "#555" : "black";
                } else if (char === 'Mt') {
                    meta = !meta;
                    el.style.backgroundColor = meta ? "#555" : "black";
                } else if (char === 'Sym') {
                    createKb(2);
                    adjustFixedDivs();
                } else if (char === 'abc') {
                    createKb(0);
                    adjustFixedDivs();
                } else if (char === '123') {
                    createKb(3);
                    adjustFixedDivs();
                } else {
                    el.style.backgroundColor = "#555";
                    setTimeout(() => {
                        el.style.backgroundColor = "black";
                    }, 100);
                    if (idx === 1) {
                        createKb(0);
                        adjustFixedDivs();
                    }
                    if (char === 'Esc') {
                        handleKey('Escape', ctrl, meta);
                    } else if (char === 'Entr') {
                        handleKey('Enter', ctrl, meta);
                    } else if (char === 'Spc') {
                        handleKey(' ', ctrl, meta);
                    } else if (char === 'Del') {
                        if (isCmdInput && cmdInput.length) {
                            cmdInput = cmdInput.slice(0, -1);
                            msg.innerHTML = cmdInput;
                        }
                    } else {
                        handleKey(char, ctrl, meta);
                    }
                    if (ctrl) {
                        ctrl = false;
                        createKb(idx === 1 ? 0 : idx);
                        adjustFixedDivs();
                    }
                    if (meta) {
                        meta = false;
                        createKb(idx === 1 ? 0 : idx);
                        adjustFixedDivs();
                    }
                }
            };
            rowEl.appendChild(el);
        }
        footer.appendChild(rowEl);
    }
}

function getVisualCenter() {

        x: window.visualViewport.width / 2 + window.visualViewport.offsetLeft,
        y: (window.visualViewport.height - footerHeight) / 2 + window.visualViewport.offsetTop
    };
}

function centerIfMobile() {
    if (mobile && curs) {
        const center = getVisualCenter();
        const rect = curs.getBoundingClientRect();
        const cursX = rect.x + (rect.width / 2);
        const cursY = rect.y + (rect.height / 2);
        const prevMarginLeft = Number(root.style.marginLeft?.slice(0, -2));
        const prevMarginTop = Number(root.style.marginTop?.slice(0, -2));
        root.style.marginLeft = `${prevMarginLeft + (center.x - cursX)}px`;
        root.style.marginTop = `${prevMarginTop + (center.y - cursY)}px`;
    }
}

function handleKey(inputKey, ctrlKey, metaKey, numPad) {
    if (inputResolve) {
        if (isCmdInput) {
            if (inputKey === 'Enter') {
                inputResolve(1);
            } else if (inputKey === 'Escape') {
                inputResolve(-1);
            } else if (inputKey.length === 1) {
                cmdInput += inputKey;
                // NOTE: history should already be handled
                msg.innerHTML = cmdInput;
            }
        } else if (inputKey.length === 1) {
            let key = (numPad && {
                1: 'b',
                2: 'j',
                3: 'n',
                4: 'h',
                6: 'l',
                7: 'y',
                8: 'k',
                9: 'u',
            }[inputKey]) || inputKey;
            let code = key.charCodeAt(0);
            if (ctrlKey) {
                code -= 96;
            } else if (metaKey) {
                code = 0x80 | code;
            }
            inputResolve(code);
            updateLastHandled(code);
        } else {
            let key = {
                Escape: 27,
                Enter: 13,
                End: 'B'.charCodeAt(0),
                ArrowDown: 'J'.charCodeAt(0),
                PageDown: 'N'.charCodeAt(0),
                ArrowLeft: 'H'.charCodeAt(0),
                ArrowRight: 'L'.charCodeAt(0),
                Home: 'Y'.charCodeAt(0),
                ArrowUp: 'K'.charCodeAt(0),
                PageUp: 'U'.charCodeAt(0)
            }[inputKey];
            if (key) {
                inputResolve(key);
                updateLastHandled(key);
            }
            if (inputKey === 'Escape') {
                prevMsgsOffset = 1;
            }
        }
    }
}

function updateLastHandled(code) {
    let lastCodeIsNotNumber = false;
    if (lastHandledKeyCodes.length) {
        const last = lastHandledKeyCodes[lastHandledKeyCodes.length - 1];
        lastCodeIsNotNumber = last < 48 || last > 57;
    }
    if (lastCodeIsNotNumber) {
        lastHandledKeyCodes = [];
    }
    lastHandledKeyCodes.push(code);
}

function autoTravelIfPan(e) {
    if (!inputResolve) {
        return false;
    }
    const rect = curs.getBoundingClientRect();
    const cursX = rect.x + (rect.width / 2);
    const cursY = rect.y + (rect.height / 2);
    const tolerance = 10;
    const center = getVisualCenter();
    const closestAnd2ndClosest = getClosestAnd2ndClosestCell(e);
    if (Math.abs(center.x - cursX) > tolerance || Math.abs(center.y - cursY) > tolerance) {
        autoQueue.splice(0, autoQueue.length);
        const coords = getCoordsFromElement(closestAnd2ndClosest.closest);
        const cursCoords = getCoordsFromElement(curs);
        autoTravelTarget = coords;
        inputResolve("_".charCodeAt(0));
        return true;
    }
    return false;
}

function relativeCoordsToDrc(y, x) {
    if (x === 0) {
        if (y > 0) return 2; // b
        return 8; // t
    } else {
        let val = y/x;

        if (val > -0.4142 && val < 0.4142) {
            if (x > 0) return 6; // r
            return 4; // l
        } else if (val > -2.4142 && val < -0.4142) {
            if (x > 0) return 9; // tr
            return 1; // bl
        } else if (val > 0.4142 && val < 2.4142) {
            if (x > 0) return 3; // br
            return 7; // tl
        } else {
            if (y > 0) return 2; // b
            return 8; // t
        }
    }
}

function getCoordsFromElement(el) {
    const coords = el.id.split("_");
    return {
        x: Number(coords[0]),
        y: Number(coords[1])
    };
}

function getDirectionKeyChar(e) {
    const rect = curs.getBoundingClientRect();
    const cursX = rect.x + (rect.width / 2);
    const cursY = rect.y + (rect.height / 2);
    const x = e.x - cursX;
    const y = e.y - cursY;
    return {
        1: 'b',
        2: 'j',
        3: 'n',
        4: 'h',
        6: 'l',
        7: 'y',
        8: 'k',
        9: 'u',
    }[relativeCoordsToDrc(y, x)];
}

function getClosestAnd2ndClosestCell(e) {
    let minDistance;
    let closest;
    let secondMinDistance;
    let secondClosest;
    for (const el of Array.from(root.children)) {
        const rect = el.getBoundingClientRect();
        const y = rect.top + (rect.height / 2);
        const x = rect.left + (rect.width / 2);
        const distanceSq = (e.x - x)*(e.x - x) + (e.y - y)*(e.y - y);
        if (!closest || (distanceSq < minDistance)) {
            if (minDistance < secondMinDistance) {
                secondClosest = closest;
                secondMinDistance = minDistance;
            }
            closest = el;
            minDistance = distanceSq;
        } else if (!secondClosest || (distanceSq < secondMinDistance)) {
            secondClosest = el;
            secondMinDistance = distanceSq;
        }
    }
    return { closest, secondClosest };
}

}
